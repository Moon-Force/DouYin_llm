<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- 最小化的 Vite 文档壳，Vue 会把单页应用挂载到下方的 `#app`。 -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Prompter</title>
  </head>
  <body class="bg-ink text-paper">
    <!-- 前端应用唯一挂载点。 -->
    <div id="app"></div>
    <!-- 前端主入口，开发时由 Vite 直接提供，生产时会被打包。 -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
